general:
  acronym: "OPODIS"
  series_url: "https://www.opodis.net"
  fullname: "International Conference on Principles of Distributed Systems"
  name: "Conference on Principles of Distributed Systems"
  date_format: "%A, %B %-d, %Y"
  locale:
    timezone: "UTC"    # Fallback timezone if none specified in year section
  tbd: "TBD"
  buttons:
    - label: "About {ACRONYM} {YEAR:02}"
      href: "#about"
    - label: "Register"
